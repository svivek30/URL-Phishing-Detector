<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PhishGuard AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <style>

        body{
            background: linear-gradient(to right,#0f172a,#1e293b);
            color:white;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial;
        }

        .container-box{
            background:#1e293b;
            padding:40px;
            border-radius:20px;
            box-shadow:0 0 20px rgba(0,0,0,0.5);
            width:500px;
            text-align:center;
        }

        h1{
            margin-bottom:30px;
            font-weight:bold;
        }

        .btn-custom{
            background:#22c55e;
            color:white;
            font-weight:bold;
        }

        .btn-custom:hover{
            background:#16a34a;
        }

    </style>

</head>

<body>

    <div class="container-box">

        <h1>🛡️ PhishGuard AI</h1>

        <form action="/predict" method="POST">

            <input
                type="text"
                class="form-control mb-3"
                name="url"
                placeholder="Enter URL"
                required
            >

            <button class="btn btn-custom w-100">
                Detect Phishing
            </button>

        </form>

    </div>

</body>

</html>
