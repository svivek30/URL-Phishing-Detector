<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Detection Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <style>

        body{
            background:#0f172a;
            color:white;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial;
        }

        .result-box{
            background:#1e293b;
            padding:40px;
            border-radius:20px;
            width:600px;
            text-align:center;
            box-shadow:0 0 20px rgba(0,0,0,0.5);
        }

        .safe{
            color:#22c55e;
            font-size:30px;
            font-weight:bold;
        }

        .phishing{
            color:#ef4444;
            font-size:30px;
            font-weight:bold;
        }

    </style>

</head>

<body>

    <div class="result-box">

        <h1>Detection Result</h1>

        {% if prediction == "SAFE URL" %}

            <p class="safe">
                ✅ SAFE URL
            </p>

        {% else %}

            <p class="phishing">
                ⚠️ PHISHING URL
            </p>

        {% endif %}

        <br>

        <p>
            <strong>URL:</strong>
            {{ url }}
        </p>

        <a href="/"
        class="btn btn-success mt-3">
            Scan Another URL
        </a>

    </div>

</body>

</html>
